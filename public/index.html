<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h1>Combat</h1>
        <input type="text" id="player-name" placeholder="Digite seu nome" maxlength="15" autocomplete="off">
        <button id="join-btn">Entrar na Partida</button>
    </div>

    <canvas id="game-canvas" width="800" height="600" style="display: none;"></canvas>

    <div id="mobile-ui">
        <div id="dpad-left">
            <button id="btn-left">◀</button>
            <button id="btn-right">▶</button>
        </div>
        <div id="dpad-right">
            <button id="btn-down">▼</button>
            <button id="btn-jump">▲</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
